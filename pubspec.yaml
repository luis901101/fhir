name: fhir
description: FHIR library of versions R4 and R5 (draft) for Dart & Flutter.
version: 1.0.0
repository: https://github.com/luis901101/fhir
issue_tracker: https://github.com/luis901101/fhir/issues

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  uuid: ^4.5.3
  xml2json: ^6.2.7
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.13.1
  freezed: ^3.2.5
  # dart run import_sorter:main
  import_sorter: ^4.6.0
  json_serializable: ^6.13.1
  test: ^1.31.0
